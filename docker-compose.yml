name: ticketbookingsystem

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./api
    command: ["/server"]
    environment:
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      PORT: "8080"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
    depends_on:
      - mongo
      - redis
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: ./api
    command: ["/worker"]
    environment:
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL}
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  app:
    build:
      context: ./app
    volumes:
      - app_dist:/output
    restart: "no"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - app_dist:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_completed_successfully
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  app_dist:
  mongo_data:
  redis_data:
